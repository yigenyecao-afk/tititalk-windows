<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Companion</title>
    <style>
      html, body, #root {
        background: transparent !important;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        /* drag 由 Pet.tsx 自己实现，整个 body 默认 click-through 不可拖。
           Tauri 的 data-tauri-drag-region 会让透明区域也接 hit-test，
           我们要的是反过来：默认不拦截 → 由真实可见区域接事件。 */
        cursor: default;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
        user-select: none;
        -webkit-user-select: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/companion-main.tsx"></script>
  </body>
</html>

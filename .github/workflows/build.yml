name: build-windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      # softprops/action-gh-release@v2 需要写 release。GITHUB_TOKEN 默认从
      # 2023+ 起为 read-only，必须显式开。`contents: write` 同时盖了 tag
      # push、release create、release upload assets 三件事，不必再细分。
      contents: write
    # (v0.14.0 双 SKU) matrix 跑 Cloud + Local 两个 flavor。SenseVoice 模型
    # ~241MB 通过 Git LFS 或 release-time 下载（见 download model 步骤）注入。
    # Local flavor 跟 cloud 同一份代码，差异仅在 tauri.conf.json 是否包含
    # bundle.resources 的 sherpa-models（local.conf.json patch 加上去）。
    strategy:
      fail-fast: false
      matrix:
        flavor: [cloud, local]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Generate full icon set (.ico for NSIS, multi-size .png for tray) from icon.png
      - name: Build icons
        shell: pwsh
        run: |
          pnpm install
          pnpm exec tauri icon src-tauri/icons/icon.png

      - name: Frontend build
        run: pnpm build

      # Local flavor 才下 SenseVoice ~165MB tar.bz2 → 解压 ~241MB 到 src-tauri/resources/sherpa-models/
      - name: Download SenseVoice model (local flavor only)
        if: matrix.flavor == 'local'
        shell: bash
        run: |
          set -e
          MODEL_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09.tar.bz2"
          mkdir -p src-tauri/resources/sherpa-models/sense-voice
          curl -L -o /tmp/sense-voice.tar.bz2 "$MODEL_URL"
          mkdir -p /tmp/sv-extract
          tar -xjf /tmp/sense-voice.tar.bz2 -C /tmp/sv-extract
          mv /tmp/sv-extract/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09/model.int8.onnx \
             src-tauri/resources/sherpa-models/sense-voice/
          mv /tmp/sv-extract/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-int8-2025-09-09/tokens.txt \
             src-tauri/resources/sherpa-models/sense-voice/
          ls -la src-tauri/resources/sherpa-models/sense-voice/
          rm -rf /tmp/sv-extract /tmp/sense-voice.tar.bz2

      - name: Tauri build (NSIS .exe)
        shell: bash
        run: |
          if [[ "${{ matrix.flavor }}" == "local" ]]; then
            pnpm exec tauri build --bundles nsis --config src-tauri/tauri.local.conf.json
          else
            pnpm exec tauri build --bundles nsis
          fi
        env:
          # Tauri updater 签名 —— 私钥用 minisign 格式存在 GitHub Secrets，
          # 跟 macOS 端 Sparkle EdDSA 一个套路。私钥本机备份在
          # ~/.tauri/tititalk-windows.key（不在 repo）。空密码也要传，否则
          # tauri-cli 会回落到提示密码并卡死 CI。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "no .exe produced"; exit 1 }
          # (v0.14.0 双 SKU) 双 flavor 都重命名到 release.ts 的 canonical 命名：
          #   cloud → TiTiTalk-windows-<v>-setup.exe
          #   local → TiTiTalk-Local-windows-<v>-setup.exe
          # 跟 windows-update.json 里的 url + sync-mirror.sh 的 release tag asset
          # 一致，避免 URL 跟 asset 名字不匹配导致 updater 404。
          $version = '${{ github.ref_name }}' -replace '^v',''
          if ('${{ matrix.flavor }}' -eq 'local') {
            $canonName = "TiTiTalk-Local-windows-$version-setup.exe"
          } else {
            $canonName = "TiTiTalk-windows-$version-setup.exe"
          }
          if ($exe.Name -ne $canonName) {
            Rename-Item -Path $exe.FullName -NewName $canonName
            $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter $canonName -Recurse | Select-Object -First 1
          }
          $sigOld = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "TiTiTalk_*_x64-setup.exe.sig" -Recurse | Select-Object -First 1
          if ($sigOld) {
            Rename-Item -Path $sigOld.FullName -NewName "$canonName.sig"
          }
          Copy-Item $exe.FullName -Destination release/
          # (fix) PowerShell `${(...)}` 语法错 —— `${}` 只展变量名，不展子表达式。
          # 之前 SHA256SUMS.txt 里 hash 部分是空字符串只剩文件名。
          $hash = (Get-FileHash $exe.FullName -Algorithm SHA256).Hash.ToLower()
          $size = (Get-Item $exe.FullName).Length
          "$hash  $($exe.Name)" | Out-File -FilePath release/SHA256SUMS.txt -Encoding ascii
          # 顺手 emit 一份机器可读 metadata.json，给 publish 脚本 / windows-latest.json 用
          @{ name = $exe.Name; sha256 = $hash; size_bytes = $size; version = '${{ github.ref_name }}' } | ConvertTo-Json | Out-File -FilePath release/metadata.json -Encoding utf8

          # —— Tauri updater 格式 windows-update.json ——
          # tauri build 在签名密钥设了的情况下会顺便生成 *.exe.sig（minisign）。
          # updater 协议需要：version / notes / pub_date / platforms.windows-x86_64.{signature,url}
          # 这里 url 写最终的 tititalk.com versioned 路径（publish 脚本 scp 到的位置）。
          $sig = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe.sig" -Recurse | Select-Object -First 1
          if ($sig) {
            Copy-Item $sig.FullName -Destination release/
            $sigContent = Get-Content $sig.FullName -Raw
            $version = '${{ github.ref_name }}' -replace '^v',''
            # (v0.14.0 双 SKU) binary 走 GitHub Release direct link（mirror repo
            # yigenyecao-afk/tititalk-downloads），不再 host 在 tititalk.com。
            # tititalk.com 只放 metadata（updater feed）兼容老 client URL。
            $mirrorRepo = "yigenyecao-afk/tititalk-downloads"
            $ghBase = "https://github.com/$mirrorRepo/releases/download/v$version"
            if ('${{ matrix.flavor }}' -eq 'local') {
              $serverName = "TiTiTalk-Local-windows-$version-setup.exe"
              $serverUrl = "$ghBase/$serverName"
              $notesText = "TiTiTalk Windows Local v$version"
            } else {
              $serverName = "TiTiTalk-windows-$version-setup.exe"
              $serverUrl = "$ghBase/$serverName"
              $notesText = "TiTiTalk Windows v$version"
            }
            $update = @{
              version = $version
              notes = $notesText
              pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                "windows-x86_64" = @{
                  signature = $sigContent
                  url = $serverUrl
                }
              }
            }
            $update | ConvertTo-Json -Depth 5 | Out-File -FilePath release/windows-update.json -Encoding utf8
          } else {
            Write-Warning "no .exe.sig produced — TAURI_SIGNING_PRIVATE_KEY 未生效；updater 该版本不可用"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: tititalk-windows-installer-${{ matrix.flavor }}
          path: |
            release/*.exe
            release/*.exe.sig
            release/SHA256SUMS.txt
            release/metadata.json
            release/windows-update.json

      - name: Publish to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/*.exe.sig
            release/SHA256SUMS.txt
            release/windows-update.json
          generate_release_notes: true

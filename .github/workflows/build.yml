name: build-windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Generate full icon set (.ico for NSIS, multi-size .png for tray) from icon.png
      - name: Build icons
        shell: pwsh
        run: |
          pnpm install
          pnpm exec tauri icon src-tauri/icons/icon.png

      - name: Frontend build
        run: pnpm build

      - name: Tauri build (NSIS .exe)
        run: pnpm exec tauri build --bundles nsis
        env:
          # Tauri updater 签名 —— 私钥用 minisign 格式存在 GitHub Secrets，
          # 跟 macOS 端 Sparkle EdDSA 一个套路。私钥本机备份在
          # ~/.tauri/tititalk-windows.key（不在 repo）。空密码也要传，否则
          # tauri-cli 会回落到提示密码并卡死 CI。
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Collect artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $exe = Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "no .exe produced"; exit 1 }
          Copy-Item $exe.FullName -Destination release/
          $hash = Get-FileHash $exe.FullName -Algorithm SHA256
          "${($hash.Hash.ToLower())}  $($exe.Name)" | Out-File -FilePath release/SHA256SUMS.txt -Encoding ascii

      - uses: actions/upload-artifact@v4
        with:
          name: tititalk-windows-installer
          path: |
            release/*.exe
            release/SHA256SUMS.txt

      - name: Publish to release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.exe
            release/SHA256SUMS.txt
          generate_release_notes: true
